services:
  training-data-mcp:
    build: .
    image: ghcr.io/coltbradley/training-data-mcp:latest
    container_name: training-data-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup training-data-mcp
    restart: unless-stopped
